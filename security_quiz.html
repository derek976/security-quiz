<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Digital Security Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1117;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .page { display: none; flex-direction: column; min-height: 100vh; }
  .page.active { display: flex; }

  /* ── Header ── */
  header {
    background: #1a1d27;
    border-bottom: 1px solid #2a2d3a;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .shield {
    width: 36px; height: 36px;
    background: #2563eb;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .shield svg { width: 20px; height: 20px; fill: #fff; }
  header h1 { font-size: 18px; font-weight: 600; color: #f0f0f0; }
  header p { font-size: 13px; color: #8b8fa8; margin-top: 2px; }

  /* ── Quiz page ── */
  .quiz-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .q-card {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 16px;
    padding: 36px 40px;
    width: 100%;
    max-width: 740px;
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .q-num {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #8b8fa8;
    text-transform: uppercase;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: #2a2d3a;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #2563eb;
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .q-text {
    font-size: 22px;
    font-weight: 600;
    line-height: 1.45;
    color: #f0f0f0;
    margin-bottom: 28px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt {
    background: #12141c;
    border: 1.5px solid #2a2d3a;
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    font-size: 15px;
    color: #d0d2e0;
    text-align: left;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: border-color 0.15s, background 0.15s;
    line-height: 1.5;
  }
  .opt:hover:not(:disabled) {
    border-color: #3b4bdb;
    background: #1a1d35;
  }
  .opt .letter {
    font-weight: 700;
    font-size: 14px;
    color: #5a5e7a;
    min-width: 22px;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .opt.correct { border-color: #16a34a; background: #0d2a1a; }
  .opt.correct .letter { color: #4ade80; }
  .opt.wrong { border-color: #dc2626; background: #2a0d0d; }
  .opt.wrong .letter { color: #f87171; }
  .opt.reveal { border-color: #16a34a; background: #0d2a1a; opacity: 0.65; }
  .opt.reveal .letter { color: #4ade80; }

  .explanation {
    margin-top: 20px;
    padding: 16px 18px;
    background: #12141c;
    border-left: 3px solid #2563eb;
    border-radius: 0 8px 8px 0;
    font-size: 14px;
    line-height: 1.65;
    color: #a0a4ba;
  }

  .q-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: 24px;
  }

  .btn-next {
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-next:hover { background: #1d4ed8; }

  /* ── Results page ── */
  .results-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 60px;
  }

  .score-hero {
    text-align: center;
    margin-bottom: 44px;
  }
  .score-circle {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: #1a1d27;
    border: 4px solid #2563eb;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  .score-num { font-size: 34px; font-weight: 700; color: #f0f0f0; line-height: 1; }
  .score-denom { font-size: 13px; color: #8b8fa8; margin-top: 2px; }
  .score-title { font-size: 24px; font-weight: 600; color: #f0f0f0; margin-bottom: 8px; }
  .score-msg { font-size: 15px; color: #8b8fa8; max-width: 440px; line-height: 1.6; }

  .results-grid {
    width: 100%;
    max-width: 740px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 36px;
  }

  .result-row {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 18px 22px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .result-icon {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
    font-size: 14px; font-weight: 700;
  }
  .result-icon.pass { background: #0d2a1a; color: #4ade80; }
  .result-icon.fail { background: #2a0d0d; color: #f87171; }
  .result-content { flex: 1; }
  .result-q { font-size: 14px; font-weight: 600; color: #d0d2e0; margin-bottom: 6px; line-height: 1.4; }
  .result-answer { font-size: 13px; color: #8b8fa8; line-height: 1.5; }
  .result-answer strong { color: #4ade80; font-weight: 500; }
  .result-answer .wrong-ans { color: #f87171; }

  .btn-restart {
    background: transparent;
    color: #a0a4ba;
    border: 1.5px solid #2a2d3a;
    border-radius: 10px;
    padding: 12px 32px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-restart:hover { border-color: #4a5080; color: #d0d2e0; }
</style>
</head>
<body>

<!-- ══════════ PAGE 1: QUIZ ══════════ -->
<div class="page active" id="page-quiz">
  <header>
    <div class="shield">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7l-9-5z"/></svg>
    </div>
    <div>
      <h1>Personal digital security</h1>
      <p>Leadership awareness quiz</p>
    </div>
  </header>

  <div class="quiz-body">
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num" id="q-num">Question 1 of 5</span>
        <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="opts"></div>
      <div id="expl"></div>
      <div class="q-footer" id="q-footer" style="display:none">
        <button class="btn-next" id="btn-next">Next question →</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ PAGE 2: RESULTS ══════════ -->
<div class="page" id="page-results">
  <header>
    <div class="shield">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7l-9-5z"/></svg>
    </div>
    <div>
      <h1>Quiz results</h1>
      <p>Personal digital security — leadership awareness</p>
    </div>
  </header>

  <div class="results-body">
    <div class="score-hero">
      <div class="score-circle">
        <div class="score-num" id="res-score">0</div>
        <div class="score-denom" id="res-denom">of 5</div>
      </div>
      <div class="score-title" id="res-title">Results</div>
      <div class="score-msg" id="res-msg"></div>
    </div>

    <div class="results-grid" id="results-grid"></div>
    <button class="btn-restart" onclick="restart()">← Restart quiz</button>
  </div>
</div>

<script>
const questions = [
  {
    q: "Should I plug my phone's USB cable into an airport USB charging station?",
    opts: [
      "Yes — public USB ports are monitored and totally safe to use.",
      "Only if the charging station has a lock or official branding on it.",
      "No — use your own AC wall charger or a USB data blocker instead.",
      "It's fine as long as you keep your phone's screen locked while it charges."
    ],
    correct: 2,
    explain: "Public USB ports can be compromised in an attack called \"juice jacking\" — malware or data-theft tools can be embedded in the port hardware. Always use your own AC adapter in a wall outlet, or carry a USB data-blocking dongle that passes power but blocks data pins."
  },
  {
    q: "Which of these is the strongest password for a new account?",
    opts: [
      "P@ssw0rd2024!",
      "fluffy-mountain-sunrise-jazz",
      "Tr0ub4dor&3",
      "12345678#Admin"
    ],
    correct: 1,
    explain: "Long passphrases made of random unrelated words are both easier to remember and harder to crack than short complex passwords. Length beats complexity — four random words give roughly 50+ bits of entropy. The other options follow predictable substitution patterns that modern cracking tools handle easily."
  },
  {
    q: "You connect to the free Wi-Fi at a coffee shop to check your work email. What's the biggest risk?",
    opts: [
      "Your battery will drain faster on public Wi-Fi.",
      "Someone on the same network could intercept your traffic or set up a fake hotspot.",
      "The coffee shop's router could slow down your connection.",
      "Your phone's location will be tracked by the Wi-Fi provider."
    ],
    correct: 1,
    explain: "Open public Wi-Fi has no encryption — anyone nearby can potentially sniff unencrypted traffic or set up an \"evil twin\" hotspot with the same network name. Use a VPN on public Wi-Fi and always look for HTTPS. Avoid accessing sensitive accounts on open networks when possible."
  },
  {
    q: "A pop-up on your computer says \"Your device is infected! Call this number immediately to speak with Microsoft support.\" What should you do?",
    opts: [
      "Call the number — it's better to be safe than sorry.",
      "Click the pop-up to dismiss it, then call Microsoft's official support line.",
      "Close your browser, run your own antivirus scan, and report it as a scam.",
      "Restart your computer and install the software the pop-up recommends."
    ],
    correct: 2,
    explain: "This is a tech support scam — one of the most common fraud tactics targeting business users. Microsoft, Apple, and other vendors never send unsolicited pop-ups asking you to call a phone number. Force-close your browser (don't click anything in the pop-up), run a reputable antivirus scan, and report the site."
  },
  {
    q: "Which of the following best describes good Multi-Factor Authentication (MFA) practice?",
    opts: [
      "Using the same strong password on all accounts so you only need to remember one.",
      "Setting a 6-digit PIN as a second factor for every account.",
      "Using an authenticator app or hardware key as a second factor.",
      "Enabling MFA only on your banking app since other accounts aren't important."
    ],
    correct: 2,
    explain: "MFA adds a second verification layer so a stolen password alone can't access your account. Authenticator apps generate time-based codes that aren't vulnerable to SMS SIM-swapping attacks, and hardware keys (like YubiKey) are the strongest option. MFA should be enabled on every account that supports it — especially email and cloud services."
  }
];

let current = 0;
let score = 0;
let answered = false;
let userAnswers = [];

function renderQ() {
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);

  document.getElementById('q-num').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('expl').innerHTML = '';
  document.getElementById('q-footer').style.display = 'none';

  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="letter">${'ABCD'[i]}</span><span>${o}</span>`;
    btn.onclick = () => pick(i);
    optsEl.appendChild(btn);
  });
  answered = false;

  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = current < questions.length - 1 ? 'Next question →' : 'See results →';
  nextBtn.onclick = current < questions.length - 1 ? nextQ : showResults;
}

function pick(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);

  userAnswers[current] = idx;

  if (idx === q.correct) {
    btns[idx].classList.add('correct');
    score++;
  } else {
    btns[idx].classList.add('wrong');
    btns[q.correct].classList.add('reveal');
  }

  document.getElementById('expl').innerHTML = `<div class="explanation">${q.explain}</div>`;
  document.getElementById('q-footer').style.display = 'flex';
}

function nextQ() { current++; renderQ(); }

function showResults() {
  document.getElementById('page-quiz').classList.remove('active');
  document.getElementById('page-results').classList.add('active');

  document.getElementById('res-score').textContent = score;
  document.getElementById('res-denom').textContent = `of ${questions.length}`;

  const pct = Math.round((score / questions.length) * 100);
  let title, msg;
  if (pct === 100) {
    title = "Perfect score!";
    msg = "You're already thinking like a security professional. Share these habits with your team.";
  } else if (pct >= 60) {
    title = "Solid awareness";
    msg = "You've got the fundamentals. The questions you missed point to specific gaps worth discussing with your team.";
  } else {
    title = "Good start";
    msg = "Security awareness is a skill that grows with practice. Review the answers below — each one represents a real-world risk.";
  }

  document.getElementById('res-title').textContent = title;
  document.getElementById('res-msg').textContent = msg;

  const grid = document.getElementById('results-grid');
  grid.innerHTML = '';
  questions.forEach((q, i) => {
    const correct = userAnswers[i] === q.correct;
    const row = document.createElement('div');
    row.className = 'result-row';
    const answerLine = correct
      ? `<strong>Correct — ${q.opts[q.correct]}</strong>`
      : `<span class="wrong-ans">Your answer: ${q.opts[userAnswers[i]]}</span><br><strong>Correct: ${q.opts[q.correct]}</strong>`;
    row.innerHTML = `
      <div class="result-icon ${correct ? 'pass' : 'fail'}">${correct ? '✓' : '✗'}</div>
      <div class="result-content">
        <div class="result-q">Q${i + 1}: ${q.q}</div>
        <div class="result-answer">${answerLine}</div>
      </div>`;
    grid.appendChild(row);
  });
}

function restart() {
  current = 0; score = 0; answered = false; userAnswers = [];
  document.getElementById('page-results').classList.remove('active');
  document.getElementById('page-quiz').classList.add('active');
  renderQ();
}

renderQ();
</script>
</body>
</html>
